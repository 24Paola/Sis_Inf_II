<!DOCTYPE html>
<html>
<head>
    <title>Nueva Venta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        .header h1 { font-size: 24px; }
        .nav { margin-bottom: 20px; }
        .nav a { display: inline-block; background: #3498db; color: white; padding: 10px 20px; text-decoration: none; margin-right: 10px; border-radius: 3px; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #2c3e50; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px; font-size: 14px; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 3px; cursor: pointer; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Registrar Nueva Venta</h1>
    </div>

    <div class="nav">
        <a href="{{ url_for('index') }}">Inicio</a>
        <a href="{{ url_for('listar_ventas') }}">Volver a Ventas</a>
    </div>

    <div class="section">
        <form method="POST">
            <div class="form-group">
                <label>Producto</label>
                <select name="producto_id" required>
                    <option value="">Seleccione un producto...</option>
                    {% for p in productos %}
                    <option value="{{ p.id }}">{{ p.nombre }} - ${{ "%.2f"|format(p.precio) }} (Stock: {{ p.stock }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" name="cantidad" min="1" required>
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" name="fecha" required>
            </div>
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" name="cliente" required>
            </div>
            <button type="submit" class="btn">Registrar Venta</button>
        </form>
    </div>
</body>
</html>
