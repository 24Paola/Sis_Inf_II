<!DOCTYPE html>
<html>
<head>
    <title>{% if producto %}Editar{% else %}Nuevo{% endif %} Producto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        .header h1 { font-size: 24px; }
        .nav { margin-bottom: 20px; }
        .nav a { display: inline-block; background: #3498db; color: white; padding: 10px 20px; text-decoration: none; margin-right: 10px; border-radius: 3px; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #2c3e50; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px; font-size: 14px; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 3px; cursor: pointer; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{% if producto %}Editar{% else %}Nuevo{% endif %} Producto</h1>
    </div>

    <div class="nav">
        <a href="{{ url_for('index') }}">Inicio</a>
        <a href="{{ url_for('listar_productos') }}">Volver a Productos</a>
    </div>

    <div class="section">
        <form method="POST">
            <div class="form-group">
                <label>Nombre del Producto</label>
                <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <input type="text" name="categoria" value="{{ producto.categoria if producto else '' }}" required>
            </div>
            <div class="form-group">
                <label>Precio</label>
                <input type="number" step="0.01" name="precio" value="{{ producto.precio if producto else '' }}" required>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" value="{{ producto.stock if producto else '' }}" required>
            </div>
            <div class="form-group">
                <label>Proveedor</label>
                <input type="text" name="proveedor" value="{{ producto.proveedor if producto else '' }}" required>
            </div>
            <button type="submit" class="btn">{% if producto %}Actualizar{% else %}Crear{% endif %} Producto</button>
        </form>
    </div>
</body>
</html>
